<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Admin | Abonelik</title><link rel="icon" href="../assets/favicon.ico"><script>window.tailwind=window.tailwind||{};tailwind.config={theme:{extend:{colors:{primary:'#2DBE8E','primary-dark':'#1F8F6A','text-dark':'#1E3A46','text-secondary':'#4A4A4A','bg-main':'#F8FAFB','bg-alt':'#F2F2F2'}}}}</script><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="https://unpkg.com/lucide@latest"></script><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/components.css"><link rel="stylesheet" href="../css/admin.css"></head><body data-requires-role="admin"><div id="adminPage"></div><template id="pageTemplate"><section class="grid gap-5 xl:grid-cols-[1fr_420px]"><article class="surface"><div class="flex items-center justify-between border-b border-slate-100 p-5"><h2 class="admin-section-title">Firma Bazlı Abonelikler</h2><button class="btn btn-primary"><i data-lucide="receipt" class="h-5 w-5"></i> Fatura Oluştur</button></div><div class="table-wrap"><table class="data-table" id="subsTable"></table></div></article><article class="surface p-5"><h2 class="admin-section-title mb-4">Aylık Gelir Grafiği</h2><div class="h-80"><canvas id="revenueChart"></canvas></div></article></section></template><script src="../js/utils.js"></script><script src="../js/toast.js"></script><script src="../js/mock-data.js"></script><script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/router.js"></script><script src="../js/charts.js"></script><script src="../js/theme-toggle.js"></script><script src="../js/admin-layout.js"></script><script>AdminLayout.render({active:"subscriptions.html",title:"Abonelik & Faturalandırma",subtitle:"Paket, faturalama durumu ve aylık gelir",content:document.querySelector("#pageTemplate").innerHTML});function badge(s){return s==="Ödendi"?"badge-success":s==="Gecikti"?"badge-danger":"badge-warning"}Api.subscriptions().then(rows=>{document.querySelector("#subsTable").innerHTML=`<thead><tr><th>Firma</th><th>Paket</th><th>Aylık Ücret</th><th>Durum</th><th>Sonraki Fatura</th></tr></thead><tbody>${rows.map(r=>`<tr><td class="font-black">${r.company}</td><td>${r.packageName}</td><td>${Utils.formatCurrency(r.monthlyFee)}</td><td><span class="badge ${badge(r.billingStatus)}">${r.billingStatus}</span></td><td>${Utils.formatDate(r.nextInvoice)}</td></tr>`).join("")}</tbody>`;Charts.line(document.querySelector("#revenueChart"),MockData.revenueTrend.labels,MockData.revenueTrend.values,"Aylık Gelir");lucide.createIcons()});</script></body></html>
