<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Admin | Premium Talepler</title><link rel="icon" href="../assets/favicon.ico"><script>window.tailwind=window.tailwind||{};tailwind.config={theme:{extend:{colors:{primary:'#2DBE8E','primary-dark':'#1F8F6A','text-dark':'#1E3A46','text-secondary':'#4A4A4A','bg-main':'#F8FAFB','bg-alt':'#F2F2F2'}}}}</script><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/components.css"><link rel="stylesheet" href="../css/admin.css"></head><body data-requires-role="admin"><div id="adminPage"></div><template id="pageTemplate"><section class="surface"><div class="table-wrap"><table class="data-table" id="premiumTable"></table></div></section><div class="modal-backdrop" id="rejectModal"><section class="modal-panel max-w-lg"><div class="p-5"><h2 class="text-xl font-black text-text-dark">Red sebebi</h2><textarea class="textarea mt-4" id="rejectReason" placeholder="Kullan횆짹c횆짹ya iletilecek k횆짹sa sebep"></textarea><div class="mt-4 flex justify-end gap-2"><button class="btn btn-secondary" id="cancelReject">Vazge횄짠</button><button class="btn btn-danger" id="confirmReject">Reddet</button></div></div></section></div></template><script src="../js/utils.js"></script><script src="../js/toast.js"></script><script src="../js/mock-data.js"></script><script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/router.js"></script><script src="../js/notifications.js"></script><script src="../js/theme-toggle.js"></script><script src="../js/admin-layout.js"></script><script>let rejectId=null;AdminLayout.render({active:"premium-requests.html",title:"Premium Talepler",subtitle:"Kullan횆짹c횆짹 paket talepleri ve eri횇타im onaylar횆짹",content:document.querySelector("#pageTemplate").innerHTML});function badge(s){return s==="Onayland캇"||s==="Onayland횆짹"?"badge-success":s==="Reddedildi"?"badge-danger":"badge-warning"}async function load(){const rows=await Api.premiumRequests();document.querySelector("#premiumTable").innerHTML=`<thead><tr><th>Kullan횆짹c횆짹</th><th>Firma</th><th>Paket</th><th>Tarih</th><th>Durum</th><th>Aksiyon</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.user}</td><td class="font-black">${r.company}</td><td>${r.packageName}</td><td>${Utils.formatDate(r.requestedAt)}</td><td><span class="badge ${badge(r.status)}">${r.status}</span></td><td><div class="flex gap-2"><button class="btn btn-primary" data-approve="${r.id}">Onayla</button><button class="btn btn-danger" data-reject="${r.id}">Reddet</button></div></td></tr>`).join("")}</tbody>`;document.querySelectorAll("[data-approve]").forEach(b=>b.onclick=async()=>{await Api.approvePremium(b.dataset.approve);Toast.show("Premium eri횇타imi a횄짠횆짹ld횆짹 ve kullan횆짹c횆짹ya bildirim g횄쨋nderildi.",{type:"success"});load()});document.querySelectorAll("[data-reject]").forEach(b=>b.onclick=()=>{rejectId=b.dataset.reject;document.querySelector("#rejectModal").classList.add("is-open")});lucide.createIcons()}document.querySelector("#cancelReject").onclick=()=>document.querySelector("#rejectModal").classList.remove("is-open");document.querySelector("#confirmReject").onclick=async()=>{await Api.rejectPremium(rejectId,document.querySelector("#rejectReason").value);Toast.show("Talep reddedildi ve bildirim g횄쨋nderildi.",{type:"warning"});document.querySelector("#rejectModal").classList.remove("is-open");load()};load();</script></body></html>
