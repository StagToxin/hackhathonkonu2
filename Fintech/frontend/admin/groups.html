<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Admin | Gruplar</title><link rel="icon" href="../assets/favicon.ico"><script>window.tailwind=window.tailwind||{};tailwind.config={theme:{extend:{colors:{primary:'#2DBE8E','primary-dark':'#1F8F6A','text-dark':'#1E3A46','text-secondary':'#4A4A4A','bg-main':'#F8FAFB','bg-alt':'#F2F2F2'}}}}</script><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/components.css"><link rel="stylesheet" href="../css/admin.css"></head><body data-requires-role="admin"><div id="adminPage"></div><template id="pageTemplate"><section class="grid gap-5 xl:grid-cols-[360px_1fr]"><aside class="surface p-5"><h2 class="admin-section-title">Yeni Grup Oluştur</h2><form id="groupForm" class="mt-4 grid gap-4"><div><label class="field-label">Grup adı</label><input class="input" name="name" required></div><div><label class="field-label">Açıklama</label><textarea class="textarea" name="description"></textarea></div><div><label class="field-label">Alt firmalar</label><select class="select" name="companies" id="groupCompanies" multiple size="4"></select></div><button class="btn btn-primary" type="submit">Grup Oluştur</button></form></aside><main class="grid gap-5"><section id="groupCards" class="grid gap-4 md:grid-cols-2"></section><section class="surface p-5"><h2 class="admin-section-title mb-4">Konsolide Mali Tablolar</h2><div id="consolidatedGrid" class="grid gap-4 md:grid-cols-3"></div><button class="btn btn-primary mt-5"><i data-lucide="file-chart-column" class="h-5 w-5"></i> Konsolide Rapor Üret</button></section></main></section></template><script src="../js/utils.js"></script><script src="../js/toast.js"></script><script src="../js/mock-data.js"></script><script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/router.js"></script><script src="../js/theme-toggle.js"></script><script src="../js/admin-layout.js"></script><script>AdminLayout.render({active:"groups.html",title:"Gruplar / Holding",subtitle:"Alt firmalar ve konsolide raporlama",content:document.querySelector("#pageTemplate").innerHTML});document.querySelector("#groupCompanies").innerHTML=MockData.companies.map(c=>`<option>${c.name}</option>`).join("");async function load(){const rows=await Api.groups();document.querySelector("#groupCards").innerHTML=rows.map(g=>`<article class="surface p-5"><div class="flex items-start justify-between gap-3"><div><h2 class="text-xl font-black text-text-dark">${g.name}</h2><p class="mt-1 text-sm text-text-secondary">${g.description}</p></div><span class="badge badge-info">${g.companies.length} firma</span></div><div class="mt-4 grid gap-2">${g.companies.map(c=>`<span class="rounded-xl bg-bg-main p-3 font-bold">${c}</span>`).join("")}</div></article>`).join("");const totals=rows.reduce((a,g)=>({turnover:a.turnover+g.turnover,debt:a.debt+g.debt,risk:a.risk+g.riskScore}),{turnover:0,debt:0,risk:0});document.querySelector("#consolidatedGrid").innerHTML=[["Toplam Ciro",Utils.formatCurrency(totals.turnover)],["Toplam Borç",Utils.formatCurrency(totals.debt)],["Ortalama Risk",Math.round(totals.risk/Math.max(rows.length,1))+"/100"]].map(([k,v])=>`<div class="rounded-xl bg-bg-main p-4"><p class="text-sm font-black text-text-secondary">${k}</p><p class="mt-2 text-2xl font-black text-text-dark">${v}</p></div>`).join("");lucide.createIcons()}document.querySelector("#groupForm").onsubmit=async(e)=>{e.preventDefault();const form=e.currentTarget;await Api.createGroup({name:form.name.value,description:form.description.value,companies:Array.from(form.companies.selectedOptions).map(o=>o.value)});Toast.show("Yeni grup oluşturuldu.",{type:"success"});form.reset();load()};load();</script></body></html>
