<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Admin | Sözleşmeler</title><link rel="icon" href="../assets/favicon.ico"><script>window.tailwind=window.tailwind||{};tailwind.config={theme:{extend:{colors:{primary:'#2DBE8E','primary-dark':'#1F8F6A','text-dark':'#1E3A46','text-secondary':'#4A4A4A','bg-main':'#F8FAFB','bg-alt':'#F2F2F2'}}}}</script><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/components.css"><link rel="stylesheet" href="../css/admin.css"></head><body data-requires-role="admin"><div id="adminPage"></div><template id="pageTemplate"><section class="grid gap-5 xl:grid-cols-[1fr_320px]"><article class="surface"><div class="flex items-center justify-between border-b border-slate-100 p-5"><h2 class="admin-section-title">Aktif Sözleşmeler</h2><button class="btn btn-primary"><i data-lucide="plus" class="h-5 w-5"></i> Yeni Sözleşme</button></div><div class="table-wrap"><table class="data-table" id="contractsTable"></table></div></article><aside class="surface p-5"><h2 class="admin-section-title">Bitiş Uyarıları</h2><div id="warningList" class="mt-4 grid gap-3"></div></aside></section></template><script src="../js/utils.js"></script><script src="../js/toast.js"></script><script src="../js/mock-data.js"></script><script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/router.js"></script><script src="../js/theme-toggle.js"></script><script src="../js/admin-layout.js"></script><script>AdminLayout.render({active:"contracts.html",title:"Sözleşmeler",subtitle:"Aktif sözleşmeler, yenileme ve bitiş uyarıları",content:document.querySelector("#pageTemplate").innerHTML});function near(end){return (new Date(end)-new Date())/(1000*60*60*24)<90}Api.contracts().then(rows=>{document.querySelector("#contractsTable").innerHTML=`<thead><tr><th>Firma</th><th>Tür</th><th>Başlangıç</th><th>Bitiş</th><th>Yenileme</th><th>Bedel</th><th>Durum</th></tr></thead><tbody>${rows.map(r=>`<tr class="${near(r.end)?"log-row-error":""}"><td class="font-black">${r.company}</td><td><span class="badge badge-info">${r.type}</span></td><td>${Utils.formatDate(r.start)}</td><td>${Utils.formatDate(r.end)}</td><td>${Utils.formatDate(r.renewal)}</td><td>${Utils.formatCurrency(r.value)}</td><td><span class="badge ${near(r.end)?"badge-danger":"badge-success"}">${near(r.end)?"Bitiş yaklaşıyor":r.status}</span></td></tr>`).join("")}</tbody>`;document.querySelector("#warningList").innerHTML=rows.filter(r=>near(r.end)).map(r=>`<div class="rounded-xl bg-red-50 p-3"><p class="font-black text-red-700">${r.company}</p><p class="text-sm font-semibold text-red-600">${Utils.formatDate(r.end)} tarihinde bitiyor</p></div>`).join("")||'<div class="empty-state min-h-0"><h3>Kritik bitiş yok</h3><p>Sözleşmeler güvenli aralıkta.</p></div>';lucide.createIcons()});</script></body></html>
