<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin | Onay Bekleyen Firmalar</title>
  <link rel="icon" href="../assets/favicon.ico">
  <script>window.tailwind=window.tailwind||{};tailwind.config = { theme: { extend: { colors: { primary: '#2DBE8E', 'primary-dark': '#1F8F6A', 'text-dark': '#1E3A46', 'text-secondary': '#4A4A4A', 'bg-main': '#F8FAFB', 'bg-alt': '#F2F2F2' } } } };</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body data-requires-role="admin">
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <a class="admin-logo" href="dashboard.html"><img src="../assets/logo-full.png" alt="Pro Sicht"></a>
      <nav class="admin-nav">
        <a data-nav href="dashboard.html"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a>
        <p class="nav-group-title">Firmalar</p>
        <a data-nav href="companies.html"><i data-lucide="building-2"></i><span>Tümü</span></a>
        <a data-nav href="pending-companies.html"><i data-lucide="user-check"></i><span>Onay Bekleyenler</span></a>
        <a data-nav href="groups.html"><i data-lucide="network"></i><span>Gruplar</span></a>
        <p class="nav-group-title">Finansal Yönetim</p>
        <a data-nav href="financial-report.html"><i data-lucide="chart-no-axes-combined"></i><span>Finansal Rapor</span></a>
        <a data-nav href="financial-status.html"><i data-lucide="activity"></i><span>Finansal Durum</span></a>
        <a data-nav href="investment.html"><i data-lucide="landmark"></i><span>Yatırım</span></a>
        <a data-nav href="presentation.html"><i data-lucide="presentation"></i><span>On Sunum</span></a>
        <p class="nav-group-title">Mali Yapımız</p>
        <a data-nav href="premium-requests.html"><i data-lucide="gem"></i><span>Premium Talepler</span></a>
        <a data-nav href="logs.html"><i data-lucide="scroll-text"></i><span>Loglar</span></a>
        <a data-nav href="settings.html"><i data-lucide="settings"></i><span>Ayarlar</span></a>
      </nav>
      <div class="admin-footer flex items-center justify-between gap-3"><div class="user-meta"><p class="text-sm font-black" data-current-user>Admin</p><p class="text-xs text-white/55">Yönetici</p></div><button class="btn btn-ghost icon-btn text-white" data-logout title="Çıkış"><i data-lucide="log-out"></i></button></div>
    </aside>
    <div class="admin-main">
      <header class="admin-header">
        <div><h1 class="text-2xl font-black text-text-dark">Onay Bekleyen Firmalar</h1><p class="text-sm font-medium text-text-secondary">Kullanıcı panelinden gelen firma kayıt talepleri</p></div>
        <a class="btn btn-secondary" href="companies.html"><i data-lucide="building-2" class="h-5 w-5"></i> Firmalara dön</a>
      </header>
      <main class="admin-content">
        <section class="surface">
          <div class="table-wrap" id="pendingTable"></div>
        </section>
      </main>
    </div>
  </div>
  <script src="../js/utils.js"></script>
  <script src="../js/toast.js"></script>
  <script src="../js/mock-data.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/router.js"></script>
  <script>
    async function loadPending() {
      const rows = await Api.pendingCompanies();
      const active = rows.filter((row) => row.status === "Bekliyor");
      const wrap = document.querySelector("#pendingTable");
      if (!active.length) {
        wrap.innerHTML = `<div class="empty-state"><div class="grid h-16 w-16 place-items-center rounded-full bg-emerald-50 text-primary-dark"><i data-lucide="user-check" class="h-8 w-8"></i></div><h3>Onay bekleyen kayıt yok</h3><p>Yeni firma kayıtları buraya düşer.</p></div>`;
      } else {
        wrap.innerHTML = `<table class="data-table"><thead><tr><th>Firma adı</th><th>Yetkili</th><th>Vergi No</th><th>Kayıt tarihi</th><th>Durum</th><th>Aksiyon</th></tr></thead><tbody>${active.map((row) => `<tr><td class="font-black text-text-dark">${row.name}</td><td>${row.contactName}<br><span class="text-xs text-text-secondary">${row.email}</span></td><td>${row.taxNo}</td><td>${Utils.formatDate(row.createdAt)}</td><td><span class="badge badge-warning">${row.status}</span></td><td><div class="flex flex-wrap gap-2"><button class="btn btn-primary" data-approve="${row.id}"><i data-lucide="check" class="h-4 w-4"></i> Onayla</button><button class="btn btn-danger" data-reject="${row.id}"><i data-lucide="x" class="h-4 w-4"></i> Reddet</button><button class="btn btn-secondary" data-review="${row.id}"><i data-lucide="eye" class="h-4 w-4"></i> İncele</button></div></td></tr>`).join("")}</tbody></table>`;
      }
      lucide.createIcons();
      document.querySelectorAll("[data-approve]").forEach((btn) => btn.addEventListener("click", async () => {
        await Api.approveCompany(btn.dataset.approve);
        Toast.show("Firma onaylandı. Kullanıcının tam erişimi açıldı.", { type: "success" });
        loadPending();
      }));
      document.querySelectorAll("[data-reject]").forEach((btn) => btn.addEventListener("click", async () => {
        await Api.rejectCompany(btn.dataset.reject);
        Toast.show("Firma kaydı reddedildi.", { type: "warning" });
        loadPending();
      }));
      document.querySelectorAll("[data-review]").forEach((btn) => btn.addEventListener("click", () => Toast.show(`Talep kodu: ${btn.dataset.review}`, { type: "info", title: "İnceleme" })));
    }
    loadPending();
  </script>
</body>
</html>
