<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kullanıcı | Premium</title>
  <link rel="icon" href="../assets/favicon.ico">
  <script>window.tailwind=window.tailwind||{};tailwind.config={theme:{extend:{colors:{primary:'#2DBE8E','primary-dark':'#1F8F6A','text-dark':'#1E3A46','text-secondary':'#4A4A4A','bg-main':'#F8FAFB','bg-alt':'#F2F2F2'}}}}</script>
  <script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/components.css"><link rel="stylesheet" href="../css/user.css">
</head>
<body data-requires-role="user">
  <div id="userPage"></div>
  <template id="pageTemplate">
    <section class="user-hero"><h2 class="text-3xl font-black">Premium ile finansal kararları hızlandırın</h2><p class="mt-2 max-w-3xl text-white/82">AI Analiz, Uzman Görüşü ve On Sunum talepleriniz admin onayına düşer; onay sonrası erişiminiz açılır.</p></section>
    <section id="packageGrid" class="mt-5 grid gap-5 lg:grid-cols-3"></section>
    <div class="modal-backdrop" id="checkoutModal">
      <section class="modal-panel max-w-2xl">
        <div class="premium-modal-header p-5"><h2 class="text-2xl font-black">Talep Onayı</h2><p class="mt-2 text-white/80" id="checkoutTitle"></p></div>
        <form id="checkoutForm" class="grid gap-4 p-5">
          <div class="grid gap-4 md:grid-cols-2"><input class="input" placeholder="Kart üzerindeki ad" data-validate="required"><input class="input" placeholder="Kart no (mock)" data-validate="required"></div>
          <div class="grid gap-4 md:grid-cols-2"><input class="input" placeholder="AA/YY" data-validate="required"><input class="input" placeholder="CVV" data-validate="required"></div>
          <div class="flex justify-end gap-2"><button class="btn btn-secondary" type="button" id="cancelCheckout">Vazgeç</button><button class="btn btn-primary" type="submit">Talep Gönder</button></div>
        </form>
      </section>
    </div>
  </template>
  <script src="../js/utils.js"></script><script src="../js/toast.js"></script><script src="../js/validation.js"></script><script src="../js/mock-data.js"></script><script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/router.js"></script><script src="../js/premium-modal.js"></script><script src="../js/theme-toggle.js"></script><script src="../js/user-layout.js"></script>
  <script>
    let selectedPackage = null;
    UserLayout.render({ active: "premium.html", title: "Premium", subtitle: "Paket seçimi ve satın alma talep akışı", content: document.querySelector("#pageTemplate").innerHTML });
    Api.premiumPackages().then((packages) => {
      document.querySelector("#packageGrid").innerHTML = packages.map((p)=>`<article class="package-card user-card p-5 ${p.popular?"is-popular":""}">${p.popular?'<span class="popular-ribbon">EN POPÜLER</span>':""}<h2 class="text-2xl font-black text-text-dark">${p.name}</h2><p class="mt-3 text-4xl font-black text-primary-dark">${p.price}</p><p class="mt-3 min-h-[48px] text-sm font-bold text-text-secondary">${p.content}</p><ul class="mt-5 grid gap-2 text-sm font-bold text-text-dark">${p.features.map(f=>`<li>✓ ${f}</li>`).join("")}</ul><button class="btn btn-primary mt-6 w-full" data-select-package="${p.id}">Seç</button></article>`).join("");
      document.querySelectorAll("[data-select-package]").forEach((button)=>button.addEventListener("click",()=>{selectedPackage=packages.find(p=>p.id===button.dataset.selectPackage);document.querySelector("#checkoutTitle").textContent=`${selectedPackage.name} paketi için ödeme bilgilerini onaylayın.`;document.querySelector("#checkoutModal").classList.add("is-open")}));
    });
    document.querySelector("#cancelCheckout").addEventListener("click",()=>document.querySelector("#checkoutModal").classList.remove("is-open"));
    Validation.bind("#checkoutForm");
    document.querySelector("#checkoutForm").addEventListener("submit", async (event)=>{event.preventDefault();if(!Validation.validateForm(event.currentTarget))return;await Api.requestPremium({packageId:selectedPackage.id,source:"premium-page"});Toast.show("Talebiniz alındı! Admin onayından sonra erişiminiz açılacak.",{type:"success",duration:5200});document.querySelector("#checkoutModal").classList.remove("is-open");});
  </script>
</body>
</html>
