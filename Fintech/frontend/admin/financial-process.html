<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Admin | Finansal Süreç</title><link rel="icon" href="../assets/favicon.ico"><script>window.tailwind=window.tailwind||{};tailwind.config={theme:{extend:{colors:{primary:'#2DBE8E','primary-dark':'#1F8F6A','text-dark':'#1E3A46','text-secondary':'#4A4A4A','bg-main':'#F8FAFB','bg-alt':'#F2F2F2'}}}}</script><script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/components.css"><link rel="stylesheet" href="../css/admin.css"></head><body data-requires-role="admin"><div id="adminPage"></div><template id="pageTemplate"><section class="surface p-4"><form id="filters" class="grid gap-3 md:grid-cols-4"><div><label class="field-label">Firma</label><select class="select" name="company" id="companyFilter"><option value="">Tümü</option></select></div><div><label class="field-label">Durum</label><select class="select" name="status"><option value="">Tümü</option><option>Ödendi</option><option>Bekliyor</option><option>Gecikti</option></select></div><div><label class="field-label">Başlangıç</label><input class="input" type="date" name="dateFrom"></div><div><label class="field-label">Bitiş</label><input class="input" type="date" name="dateTo"></div></form></section><section class="mt-5 grid gap-5 xl:grid-cols-[1fr_320px]"><article class="surface"><div class="border-b border-slate-100 p-5"><h2 class="admin-section-title">Kim, neyi, ne zaman ödedi?</h2></div><div class="table-wrap"><table class="data-table" id="processTable"></table></div></article><aside class="surface p-5"><h2 class="admin-section-title">Gecikme Takibi</h2><div id="delayList" class="mt-4 grid gap-3"></div></aside></section></template><script src="../js/utils.js"></script><script src="../js/toast.js"></script><script src="../js/mock-data.js"></script><script src="../js/api.js"></script><script src="../js/auth.js"></script><script src="../js/router.js"></script><script src="../js/theme-toggle.js"></script><script src="../js/admin-layout.js"></script><script>AdminLayout.render({active:"financial-process.html",title:"Finansal Süreç Yönetimi",subtitle:"Ödeme, gecikme ve tahsilat operasyonu",content:document.querySelector("#pageTemplate").innerHTML});document.querySelector("#companyFilter").innerHTML+=MockData.companies.map(c=>`<option>${c.name}</option>`).join("");function badge(s){return s==="Ödendi"?"badge-success":s==="Gecikti"?"badge-danger":"badge-warning"}async function load(){const rows=await Api.financialProcess(Object.fromEntries(new FormData(document.querySelector("#filters")).entries()));document.querySelector("#processTable").innerHTML=`<thead><tr><th>Firma</th><th>Ödeyen</th><th>Kalem</th><th>Tarih</th><th>Tutar</th><th>Durum</th><th>Gecikme</th></tr></thead><tbody>${rows.map(r=>`<tr><td class="font-black">${r.company}</td><td>${r.payer}</td><td>${r.item}</td><td>${Utils.formatDate(r.paidAt)}</td><td>${Utils.formatCurrency(r.amount)}</td><td><span class="badge ${badge(r.status)}">${r.status}</span></td><td>${r.delayDays} gün</td></tr>`).join("")}</tbody>`;document.querySelector("#delayList").innerHTML=rows.filter(r=>r.delayDays>0).map(r=>`<div class="rounded-xl ${r.delayDays>7?"bg-red-50":"bg-amber-50"} p-3"><p class="font-black">${r.company}</p><p class="text-sm font-semibold">${r.delayDays} gün gecikme · ${Utils.formatCurrency(r.amount)}</p></div>`).join("")||"<p class='text-sm font-bold text-text-secondary'>Gecikmeli tahsilat yok.</p>";lucide.createIcons()}document.querySelector("#filters").addEventListener("change",load);load();</script></body></html>
